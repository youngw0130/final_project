spring:
  datasource:
    # SPRING_DATASOURCE_URL / USERNAME / PASSWORD 환경변수로 주입 (Render 등)
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

jwt:
  secret: ${JWT_SECRET:please-change-this-default-secret-key-for-production-use-32chars}
  expiration: 86400000

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.creditn: INFO
    root: WARN
