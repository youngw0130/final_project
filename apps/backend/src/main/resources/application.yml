spring:
  datasource:
    url: jdbc:h2:mem:creditndb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    jpa:
      repositories:
        enabled: true

jwt:
  secret: credit-n-secret-key-for-jwt-token-signing-must-be-long-enough-256bits
  expiration: 86400000  # 24시간 (ms)

portone:
  store-id: ${PORTONE_STORE_ID:demo-store-id}
  api-secret: ${PORTONE_API_SECRET:demo-secret}

server:
  port: 8080

logging:
  level:
    com.creditn: DEBUG
