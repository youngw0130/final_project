<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>크레딧-N · 데모</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Pretendard', -apple-system, sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .badge-status { @apply inline-block px-2 py-0.5 rounded-full text-xs font-semibold; }
    .log-line { animation: fadein .25s ease-out; }
    @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

<div class="max-w-7xl mx-auto px-6 py-8">

  <div class="flex items-center justify-end gap-3 mb-6">
    <a href="index.html" class="text-sm text-slate-600 hover:text-slate-900">← 허브</a>
    <div id="user-badge" class="text-xs px-3 py-1.5 rounded-full bg-slate-200 text-slate-700 font-semibold">로그아웃 상태</div>
    <button id="btn-logout" class="text-xs px-3 py-1.5 rounded-lg bg-rose-100 text-rose-700 font-semibold hover:bg-rose-200">로그아웃</button>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

    <!-- 왼쪽: 컨트롤 -->
    <div class="lg:col-span-7 space-y-5">

      <!-- 1. 인증 -->
      <section class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
        <div class="flex items-center gap-2 mb-4">
          <span class="w-7 h-7 rounded-full bg-blue-100 text-blue-700 font-bold text-sm flex items-center justify-center">1</span>
          <h2 class="font-bold text-slate-900">로그인 / 회원가입</h2>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <input id="auth-username" placeholder="아이디" value="감나빗"    class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-100 outline-none" />
          <input id="auth-password" placeholder="비밀번호" value="test1234" type="password" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-100 outline-none" />
          <input id="auth-email"    placeholder="이메일 (가입 시)" class="border border-slate-200 rounded-lg px-3 py-2 text-sm col-span-2" />
          <input id="auth-phone"    placeholder="휴대폰 (가입 시)" class="border border-slate-200 rounded-lg px-3 py-2 text-sm col-span-2" />
        </div>

        <div class="flex gap-2 mt-3">
          <button data-action="login"  class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg text-sm">로그인</button>
          <button data-action="signup" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2.5 rounded-lg text-sm">회원가입</button>
        </div>
        <p class="text-xs text-slate-400 mt-2">데모 계정: <code>감나빗 / test1234</code>, <code>minsu / test1234</code>, <code>sora / test1234</code></p>
      </section>

      <!-- 2. 모임 -->
      <section class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
        <div class="flex items-center gap-2 mb-4">
          <span class="w-7 h-7 rounded-full bg-blue-100 text-blue-700 font-bold text-sm flex items-center justify-center">2</span>
          <h2 class="font-bold text-slate-900">모임 관리</h2>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <button data-action="my-moims" class="bg-slate-900 hover:bg-slate-800 text-white font-semibold py-2 rounded-lg text-sm">📋 내 모임 조회</button>
          <button data-action="create-moim" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 rounded-lg text-sm">➕ 새 모임 생성 (자동)</button>
        </div>

        <div class="mt-3 pt-3 border-t border-slate-100">
          <p class="text-xs font-semibold text-slate-500 mb-2">선택된 모임 ID</p>
          <div class="flex gap-2">
            <input id="moim-id" placeholder="모임 ID" value="1" type="number" class="border border-slate-200 rounded-lg px-3 py-2 text-sm w-24" />
            <button data-action="get-moim"          class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold px-3 py-2 rounded-lg text-sm">상세</button>
            <button data-action="get-participants" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold px-3 py-2 rounded-lg text-sm">참여자</button>
            <button data-action="get-payments"     class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold px-3 py-2 rounded-lg text-sm">결제 내역</button>
          </div>
        </div>
      </section>

      <!-- 3. 입금 -->
      <section class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
        <div class="flex items-center gap-2 mb-4">
          <span class="w-7 h-7 rounded-full bg-blue-100 text-blue-700 font-bold text-sm flex items-center justify-center">3</span>
          <h2 class="font-bold text-slate-900">입금 확인 (PortOne 웹훅 mock)</h2>
        </div>
        <div class="flex gap-2">
          <input id="confirm-userid" placeholder="userId" value="1" type="number" class="border border-slate-200 rounded-lg px-3 py-2 text-sm w-32" />
          <button data-action="confirm-deposit" class="flex-1 bg-cyan-600 hover:bg-cyan-700 text-white font-semibold py-2 rounded-lg text-sm">💰 입금 확정</button>
        </div>
        <p class="text-xs text-slate-400 mt-2">전원 입금 시 모임이 자동으로 ACTIVE 로 전환됩니다.</p>
      </section>

      <!-- 4. 결제 -->
      <section class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
        <div class="flex items-center gap-2 mb-4">
          <span class="w-7 h-7 rounded-full bg-blue-100 text-blue-700 font-bold text-sm flex items-center justify-center">4</span>
          <h2 class="font-bold text-slate-900">QR 결제 (가맹점 결제 mock)</h2>
        </div>
        <div class="grid grid-cols-3 gap-2">
          <input id="pay-merchant" placeholder="가맹점명" value="라멘야 부산본점" class="border border-slate-200 rounded-lg px-3 py-2 text-sm" />
          <input id="pay-category" placeholder="카테고리" value="식음료"     class="border border-slate-200 rounded-lg px-3 py-2 text-sm" />
          <input id="pay-amount"   placeholder="금액"     value="15000" type="number" class="border border-slate-200 rounded-lg px-3 py-2 text-sm" />
        </div>
        <button data-action="pay" class="w-full mt-3 bg-violet-600 hover:bg-violet-700 text-white font-semibold py-2.5 rounded-lg text-sm">📱 QR 결제 승인</button>
        <p class="text-xs text-slate-400 mt-2">ACTIVE 상태 모임에서만 결제 가능합니다.</p>
      </section>

      <!-- 5. 정산 -->
      <section class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
        <div class="flex items-center gap-2 mb-4">
          <span class="w-7 h-7 rounded-full bg-blue-100 text-blue-700 font-bold text-sm flex items-center justify-center">5</span>
          <h2 class="font-bold text-slate-900">넷팅 정산 + 환급</h2>
        </div>
        <button data-action="settle" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-2.5 rounded-lg text-sm">📊 정산 실행</button>
        <p class="text-xs text-slate-400 mt-2">총지출을 1/N로 분담 → 잔액 자동 환급 → 모임 CLOSED.</p>
      </section>
    </div>

    <!-- 오른쪽: 로그 + 상태 -->
    <div class="lg:col-span-5 space-y-5">

      <section class="bg-slate-900 rounded-2xl shadow-sm p-5 text-slate-100">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-bold text-sm tracking-wider">📡 API LOG</h2>
          <button id="btn-clear-log" class="text-xs text-slate-400 hover:text-white">CLEAR</button>
        </div>
        <div id="log" class="mono text-xs space-y-2 max-h-[36rem] overflow-y-auto"></div>
      </section>
    </div>
  </div>
</div>

<script src="assets/api.js"></script>
<script>
  const $ = (s) => document.querySelector(s);
  const log = $('#log');

  function pushLog(label, payload, kind = 'info') {
    const colorMap = {
      ok:    'text-emerald-300',
      err:   'text-rose-300',
      info:  'text-blue-300',
      mute:  'text-slate-400'
    };
    const line = document.createElement('div');
    line.className = 'log-line';
    const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
    const body = payload === undefined ? '' :
      (typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2));
    line.innerHTML = `
      <div class="${colorMap[kind] || colorMap.info}">[${time}] ${label}</div>
      ${body ? `<pre class="text-slate-200 pl-3 border-l border-slate-700">${escapeHtml(body)}</pre>` : ''}
    `;
    log.prepend(line);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
  }

  function refreshUserBadge() {
    const u = CreditN.auth.user;
    const badge = $('#user-badge');
    if (u) {
      badge.className = 'text-xs px-3 py-1.5 rounded-full bg-emerald-100 text-emerald-700 font-semibold';
      badge.textContent = `🟢 ${u.username} · 스코어 ${u.linkScore ?? '-'}`;
    } else {
      badge.className = 'text-xs px-3 py-1.5 rounded-full bg-slate-200 text-slate-700 font-semibold';
      badge.textContent = '로그아웃 상태';
    }
  }
  refreshUserBadge();

  async function exec(label, fn) {
    pushLog(`▶ ${label}`, undefined, 'info');
    try {
      const result = await fn();
      pushLog(`✓ ${label}`, result, 'ok');
      return result;
    } catch (e) {
      pushLog(`✗ ${label} (${e.status || 'error'})`, e.message, 'err');
      throw e;
    }
  }

  const actions = {
    async login() {
      const res = await exec('POST /api/auth/login', () =>
        CreditN.api.auth.login({ username: $('#auth-username').value, password: $('#auth-password').value }));
      refreshUserBadge();
      return res;
    },
    async signup() {
      const res = await exec('POST /api/auth/signup', () =>
        CreditN.api.auth.signup({
          username: $('#auth-username').value,
          password: $('#auth-password').value,
          email:    $('#auth-email').value || `${$('#auth-username').value}@creditn.com`,
          phoneNumber: $('#auth-phone').value
        }));
      refreshUserBadge();
      return res;
    },
    'my-moims':         () => exec('GET /api/moims/my',         () => CreditN.api.moim.my()),
    'create-moim':      () => exec('POST /api/moims',           () => CreditN.api.moim.create({
                                title: `즉석 모임 ${Date.now() % 1000}`,
                                description: '데모용 자동 생성',
                                emoji: '🎉',
                                scheduledAt: new Date(Date.now() + 86400000).toISOString().split('.')[0],
                                targetParticipantCount: 3,
                                depositPerPerson: 20000,
                                bufferRate: 0.07,
                                refundAccountNumber: '110-1234-5678',
                                refundBank: '토스뱅크'
                              })),
    'get-moim':         () => exec(`GET /api/moims/${$('#moim-id').value}`,             () => CreditN.api.moim.get($('#moim-id').value)),
    'get-participants': () => exec(`GET /api/moims/${$('#moim-id').value}/participants`,() => CreditN.api.moim.participants($('#moim-id').value)),
    'get-payments':     () => exec(`GET /api/moims/${$('#moim-id').value}/payments`,    () => CreditN.api.payment.list($('#moim-id').value)),
    'confirm-deposit':  () => exec(`POST /api/moims/${$('#moim-id').value}/deposit/confirm?userId=${$('#confirm-userid').value}`,
                                   () => CreditN.api.moim.confirmDeposit($('#moim-id').value, $('#confirm-userid').value)),
    pay:                () => exec(`POST /api/moims/${$('#moim-id').value}/payments`,   () => CreditN.api.payment.pay($('#moim-id').value, {
                                merchantName: $('#pay-merchant').value,
                                category:     $('#pay-category').value,
                                amount:       Number($('#pay-amount').value)
                              })),
    settle:             () => exec(`POST /api/moims/${$('#moim-id').value}/settle`,     () => CreditN.api.moim.settle($('#moim-id').value))
  };

  document.querySelectorAll('button[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const fn = actions[btn.dataset.action];
      if (fn) fn().catch(() => {});
    });
  });

  $('#btn-logout').addEventListener('click', () => {
    CreditN.api.auth.logout();
    refreshUserBadge();
    pushLog('logout', '클라이언트 토큰을 삭제했습니다.', 'mute');
  });

  $('#btn-clear-log').addEventListener('click', () => { log.innerHTML = ''; });

  pushLog('ready', `API base: ${CreditN.API_BASE}`, 'mute');
</script>
</body>
</html>
